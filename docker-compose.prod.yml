services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
        image: laravel-app:latest
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            XDEBUG_MODE: off
        ports:
            - '${APP_PORT:-80}:9000'
        volumes: []
        healthcheck:
            test: ['CMD-SHELL', 'curl -f http://localhost:9000/ || exit 1']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    queue:
        build:
            context: .
            dockerfile: Dockerfile
        image: laravel-app:latest
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            XDEBUG_MODE: off
        volumes: []
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        image: laravel-app:latest
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
        volumes: []
        command: php artisan schedule:work

    redis:
        image: 'redis:7-alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s
            interval: 10s

    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
            interval: 10s

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
